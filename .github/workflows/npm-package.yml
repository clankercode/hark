# Validate @ultradyn/hark package on PRs that touch skills or the package.
name: Validate @ultradyn/hark package

on:
  pull_request:
    paths:
      - "packages/ultradyn-hark/**"
      - "skill/**"
      - "skills/**"
      - ".github/workflows/npm-package.yml"
      - ".github/workflows/release.yml"
  push:
    branches: [master]
    paths:
      - "packages/ultradyn-hark/**"
      - "skill/**"
      - "skills/**"
      - ".github/workflows/npm-package.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ultradyn-hark
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync skills from monorepo
        env:
          HARK_SYNC_REQUIRED: "1"
        run: node ./scripts/sync-skills.mjs

      - name: Skills match monorepo
        run: |
          diff -u ../../skill/hark/SKILL.md skills/hark/SKILL.md
          diff -u ../../skill/handsfree/SKILL.md skills/handsfree/SKILL.md

      - name: hark-skill bin
        run: |
          node ./bin/hark-skill.js list
          node ./bin/hark-skill.js path
          node ./bin/hark-skill.js help >/dev/null

      - name: npm pack --dry-run
        run: npm pack --dry-run

      # `skills --list` renders names as styled list items: a leading box-drawing
      # prefix (e.g. "│    hark") plus ANSI colour codes when colour is forced (CI).
      # Strip ANSI first, then match each name as the sole token on its line so the
      # assertions don't depend on the exact decoration.
      - name: npx skills discovers skills (package + monorepo)
        working-directory: ${{ github.workspace }}
        run: |
          assert_two_skills() {
            local src="$1" raw clean
            raw="$(npx --yes skills@1.5.16 add "$src" --list 2>&1)"
            clean="$(printf '%s\n' "$raw" | sed -E 's/\x1b\[[0-9;?]*[a-zA-Z]//g')"
            printf '%s\n' "$clean"
            printf '%s\n' "$clean" | grep -q 'Found 2 skills'
            printf '%s\n' "$clean" | grep -qE '^[^[:alnum:]]*hark[[:space:]]*$'
            printf '%s\n' "$clean" | grep -qE '^[^[:alnum:]]*handsfree[[:space:]]*$'
          }
          assert_two_skills ./packages/ultradyn-hark
          assert_two_skills .
